name: Build, Publish, and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Adjust as needed

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal

      - name: Publish using ClickOnce Profile
        run: dotnet publish --configuration Release --output ./publish -p:PublishProfile=ClickOnceProfile /p:PublishDir=./publish /p:GenerateClickOnceManifests=true

      # Deploy to GitHub Pages branch (gh-pages)
      - name: Clear GitHub Pages branch
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          robocopy ./publish ./ /MIR /XD .git /R:3 /W:10
          git add .
          git commit -m "Clean old files" || echo "No changes to commit"
          git push origin gh-pages
        shell: cmd
          
