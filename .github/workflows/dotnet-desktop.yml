name: Build, Publish, and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Adjust as needed

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal

      - name: Publish using ClickOnce Profile
        run: dotnet publish --configuration Release --output ./publish -p:PublishProfile=ClickOnceProfile /p:PublishDir=./publish /p:GenerateClickOnceManifests=true

      - name: Clear GitHub Pages branch
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          del /s /q * 2>nul || echo "No files to delete"
          git clean -fd
          git commit -m "Clean old files" || echo "No changes to commit"
          git push origin gh-pages
        shell: cmd

      # Deploy to GitHub Pages branch (gh-pages)
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: publish
          clean: true
